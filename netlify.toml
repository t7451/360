[build]
  base = "client-portal"
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy — route /api calls to your Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://forge3d-api.up.railway.app/api/:splat"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefix=/dev/null"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML (SPA needs fresh index.html)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
