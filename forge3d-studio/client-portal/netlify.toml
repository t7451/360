[build]
  command   = "npm run build"
  publish   = "dist"
  base      = "forge3d-studio/client-portal"

[build.environment]
  NODE_VERSION = "20"

# ── Dev server (netlify dev) ──────────────────────────────────────────────────
[dev]
  command = "npm run dev"
  port    = 5173

# ── Redirects ─────────────────────────────────────────────────────────────────
# API proxy — keeps the portal origin-free from CORS issues.
# The destination URL is overridden by public/_redirects for drop deploys;
# for git-based deploys the env var is substituted at build time via the
# deploy-drop.sh helper (or set in the Netlify UI under Site → Environment).
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-ACTUAL-API.up.railway.app/api/:splat"
  status = 200
  force  = true

# SPA catch-all — send every non-asset request to index.html so React Router
# handles client-side navigation without a 404 on hard refresh.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────
# HTML documents — no caching, full security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' data:;"
    Cache-Control             = "no-cache, no-store, must-revalidate"

# Static assets — long-lived cache (Vite fingerprints filenames).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
